<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Tank Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
            color: white;
        }

        canvas {
            display: none;
            background: #222;
        }

        #menu {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 40px;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #444;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #666;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            display: none;
        }
    </style>
</head>
<body>

<!-- 🎮 MAIN MENU -->
<div id="menu">
    <h1>🚀 Tank Game</h1>

    <button onclick="startGame()">▶️ Play</button>
    <button onclick="openCrate()">🎰 Open Crate</button>
</div>

<!-- 🎯 GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- 📊 HUD -->
<div id="hud">
    <div id="tankName">Tank: -</div>
    <div id="tankLevel">Level: 1</div>
    <div id="tankXP">XP: 0</div>
</div>

<!-- 📜 SCRIPTS -->
<script src="tank.js"></script>
<script src="game.js"></script>
<script src="tanks/basictank.js"></script>

<script>
    function startGame() {
        document.getElementById("menu").style.display = "none";
        document.getElementById("gameCanvas").style.display = "block";
        document.getElementById("hud").style.display = "block";

        if (typeof initGame === "function") {
            initGame();
        }
    }

    function openCrate() {
        if (typeof rollTank === "function") {
            let tank = rollTank();
            alert("Je kreeg: " + tank.name);
        } else {
            alert("Crate systeem nog niet geladen!");
        }
    }
</script>

</body>
</html>
